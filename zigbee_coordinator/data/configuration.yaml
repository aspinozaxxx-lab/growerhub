version: 5
homeassistant:
  enabled: false
frontend:
  enabled: true
  host: 127.0.0.1
  port: 8080
mqtt:
  server: '!secret.yaml server'
  user: '!secret.yaml user'
  password: '!secret.yaml password'
  base_topic: CHANGE_ME_BASE_TOPIC
  client_id: CHANGE_ME_CLIENT_ID
  reject_unauthorized: true
serial:
  port: CHANGE_ME_SERIAL_PORT
  adapter: CHANGE_ME_ADAPTER
advanced:
  network_key: GENERATE
availability:
  enabled: true
