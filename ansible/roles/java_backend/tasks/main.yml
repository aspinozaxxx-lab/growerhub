---
- name: Install Java runtime
  become: true
  ansible.builtin.apt:
    name: openjdk-21-jre-headless
    update_cache: true
    state: present

- name: Install sudoers rule for java backend deploy
  become: true
  ansible.builtin.copy:
    dest: "{{ java_backend_sudoers_file }}"
    owner: root
    group: root
    mode: "0440"
    content: |-
      {{ java_backend_sudo_user }} ALL=(root) NOPASSWD: /usr/bin/test, /usr/bin/grep, /usr/bin/curl, /usr/bin/cat, /bin/sed, /usr/bin/systemctl, /bin/systemctl, /usr/bin/journalctl
    validate: "/usr/sbin/visudo -cf %s"

- name: Ensure deployment directory exists
  become: true
  ansible.builtin.file:
    path: "{{ java_backend_deploy_dir }}"
    state: directory
    owner: "{{ java_backend_user }}"
    group: "{{ java_backend_group }}"
    mode: "0755"

- name: Ensure firmware binaries directory exists
  become: true
  ansible.builtin.file:
    path: "{{ java_backend_deploy_dir }}/firmware_binaries"
    state: directory
    owner: "{{ java_backend_user }}"
    group: "{{ java_backend_group }}"
    mode: "0755"

- name: Check local backend jar exists
  delegate_to: localhost
  become: false
  ansible.builtin.stat:
    path: "{{ java_backend_jar_src }}"
  register: java_backend_jar_stat

- name: Fail if local backend jar is missing
  ansible.builtin.fail:
    msg: "Backend jar not found: {{ java_backend_jar_src }}. Run backend build before java_backend role."
  when: not java_backend_jar_stat.stat.exists

- name: Deploy backend jar
  become: true
  ansible.builtin.copy:
    src: "{{ java_backend_jar_src }}"
    dest: "{{ java_backend_deploy_dir }}/app.jar"
    owner: "{{ java_backend_user }}"
    group: "{{ java_backend_group }}"
    mode: "0644"
  notify:
    - restart java backend

- name: Assert required env values are set
  ansible.builtin.assert:
    that:
      - java_backend_secret_key | default("") | length > 0
      - java_backend_db_url | default("") | length > 0
      - java_backend_db_username | default("") | length > 0
      - java_backend_db_password | default("") | length > 0
    fail_msg: >-
      Ne zadany obyazatelnye peremennye dlya env-file java backend.
      Nuzhno ukazat' java_backend_secret_key, java_backend_db_url,
      java_backend_db_username, java_backend_db_password v vars/vault.

- name: Assert MQTT vars when MQTT is enabled
  ansible.builtin.assert:
    that:
      - java_backend_mqtt_port is defined
      - (java_backend_mqtt_port | int) > 0
      - (java_backend_mqtt_username | default("") | length == 0 and java_backend_mqtt_password | default("") | length == 0)
        or (java_backend_mqtt_username | default("") | length > 0 and java_backend_mqtt_password | default("") | length > 0)
    fail_msg: >-
      MQTT vklyuchen (java_backend_mqtt_host zadany), no ne vse peremennye est'.
      Nuzhno ukazat' java_backend_mqtt_port, a takzhe oba java_backend_mqtt_username i java_backend_mqtt_password,
      esli ispol'zuetsya autentifikaciya.
  when: java_backend_mqtt_host | default("") | length > 0

- name: Assert provisioning MQTT vars when self-service is enabled
  ansible.builtin.assert:
    that:
      - java_backend_mqtt_provisioning_enabled | bool
      - java_backend_mqtt_provisioning_host | length > 0
      - (java_backend_mqtt_provisioning_port | int) > 0
      - java_backend_mqtt_provisioning_username | length > 0
      - java_backend_mqtt_provisioning_password | length >= 32
      - java_backend_self_service_legacy_owner_email | length > 0
    fail_msg: >-
      Self-service nel'zya vklyuchit' bez provisioning MQTT credentials
      i SELF_SERVICE_LEGACY_OWNER_EMAIL.
  when: java_backend_self_service_enabled | bool

- name: Ensure env directory exists
  become: true
  ansible.builtin.file:
    path: "{{ java_backend_env_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render env file for java backend
  become: true
  ansible.builtin.copy:
    dest: "{{ java_backend_env_file_path }}"
    owner: root
    group: root
    mode: "0600"
    content: |-
      {% for item in java_backend_env | dict2items %}
      {{ item.key }}={{ item.value }}
      {% endfor %}

- name: Install systemd unit for java backend
  become: true
  ansible.builtin.copy:
    dest: "/etc/systemd/system/{{ java_backend_service_name }}"
    owner: root
    group: root
    mode: "0644"
    content: |-
      [Unit]
      Description=GrowerHub Java Backend
      After=network-online.target mosquitto.service
      Wants=network-online.target

      [Service]
      Type=simple
      User={{ java_backend_user }}
      WorkingDirectory={{ java_backend_deploy_dir }}
      EnvironmentFile={{ java_backend_env_file_path }}
      Environment=SERVER_PORT={{ java_backend_host_port }}
      ExecStart={{ java_backend_java_bin }} -jar {{ java_backend_deploy_dir }}/app.jar
      Restart=always
      RestartSec=5
      SuccessExitStatus=143

      [Install]
      WantedBy=multi-user.target
  notify:
    - reload systemd
    - restart java backend

- name: Remove legacy docker container if present
  become: true
  ansible.builtin.command: docker rm -f growerhub-java-backend
  register: java_backend_legacy_container
  changed_when: java_backend_legacy_container.rc == 0
  failed_when: false

- name: Flush handlers before validation
  ansible.builtin.meta: flush_handlers

- name: Enable java backend service
  become: true
  ansible.builtin.systemd:
    name: "{{ java_backend_service_name }}"
    enabled: true

- name: Wait for java backend health endpoint
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    ok=0
    for i in $(seq 1 30); do
      if curl -fsS http://{{ java_backend_bind_ip }}:{{ java_backend_host_port }}/health >/tmp/java_backend_health.json 2>/tmp/java_backend_health.err; then
        ok=1
        cat /tmp/java_backend_health.json
        break
      fi
      echo "healthcheck attempt $i failed: $(cat /tmp/java_backend_health.err 2>/dev/null || true)"
      sleep 1
    done
    if [ "$ok" -ne 1 ]; then
      exit 1
    fi
  args:
    executable: /bin/bash

- name: Fail if MQTT failed to start
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    logs_file="$(mktemp)"
    journalctl -u {{ java_backend_service_name }} --since "10 minutes ago" --no-pager > "$logs_file"
    if grep -Eq "MQTT (publisher|subscriber) failed to start" "$logs_file"; then
      rm -f "$logs_file"
      exit 1
    fi
    rm -f "$logs_file"
  args:
    executable: /bin/bash

- name: Assert MQTT publisher and subscriber connected
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    logs_file="$(mktemp)"
    journalctl -u {{ java_backend_service_name }} --since "10 minutes ago" --no-pager > "$logs_file"
    grep -q "MQTT publisher connected" "$logs_file"
    grep -q "MQTT subscriber connected" "$logs_file"
    rm -f "$logs_file"
  args:
    executable: /bin/bash

- name: Remove legacy docker image if present
  become: true
  ansible.builtin.command: docker image rm growerhub-backend:local
  register: java_backend_legacy_image
  changed_when: java_backend_legacy_image.rc == 0
  failed_when: false
