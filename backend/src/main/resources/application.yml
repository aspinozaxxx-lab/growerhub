ack:
  # TTL dlya ack (sek).
  ttlSeconds: 180
  # Period ochistki ack (sek).
  cleanupPeriodSeconds: 60

device:
  # Porog online statusa (sek).
  onlineThresholdS: 60
  defaults:
    # Cel' vlazhnosti (procent).
    targetMoisture: 40.0
    # Dlitel'nost' poliva (sek).
    wateringDurationSeconds: 30
    # Timeout poliva (sek).
    wateringTimeoutSeconds: 300
    # Chas vklyuchenija sveta.
    lightOnHour: 6
    # Chas vyklyuchenija sveta.
    lightOffHour: 22
    # Dlitel'nost' sveta (chasy).
    lightDurationHours: 16
    # Tekushchaja versija firmware.
    currentVersion: "1.0.0"
    # Poslednjaja versija firmware.
    latestVersion: "1.0.0"
    # Priznak dostupnosti update.
    updateAvailable: false
  firmware:
    # Versija po umolchaniju.
    defaultVersion: "old"

auth:
  sso:
    # Spisok podderzhivaemyh providerov.
    supportedProviders: ["google", "yandex"]
    # Timeout soedinenija (sek).
    connectTimeoutSeconds: 10
    # Timeout zaprosa (sek).
    requestTimeoutSeconds: 10
    # Vremja zhizni state-tokena (min).
    stateTtlMinutes: 10

security:
  password:
    pbkdf2:
      # Kolichestvo iteracij.
      rounds: 29000
      # Razmer soli (bytes).
      saltBytes: 16
      # Razmer hesha (bytes).
      hashBytes: 32

firmware:
  # Katalog binarnikov firmware.
  binariesDir: "firmware_binaries"

server:
  # Public base URL.
  publicBaseUrl: "https://growerhub.ru"

advisor:
  # Priznak vklyucheniya advisor.
  enabled: false
  watering:
    # TTL rekomendacii poliva.
    ttl: "24h"
  llm:
    deepseek:
      # Base URL dlya LLM.
      baseUrl: "https://api.deepseek.com/v1/chat/completions"
      # API key dlya LLM.
      apiKey: "${ADVISOR_DEEPSEEK_API_KEY:}"
      # Model LLM.
      model: "deepseek-chat"
      # Timeout zaprosa (sek).
      requestTimeoutSeconds: 15

plant:
  history:
    # Maksimal'noe kolichestvo tochek.
    maxPoints: 200
    # Chasy istorii po umolchaniju.
    defaultHours: 24

sensor:
  history:
    # Maksimal'noe kolichestvo tochek.
    maxPoints: 200
    # Chasy istorii po umolchaniju.
    defaultHours: 24

pump:
  history:
    # Maksimal'noe kolichestvo tochek sostoyaniya nasosa.
    maxPoints: 200
    # Chasy istorii nasosa po umolchaniju.
    defaultHours: 24
  watering:
    # Defoltnyi rashod (ml/ch).
    defaultRateMlPerHour: 2000
    # Defoltnaja dlitel'nost' poliva po vremeni (sek).
    defaultTimedDurationS: 300
    # Defoltnyj limit aktivnogo poliva do protechki (sek).
    defaultUntilLeakMaxActiveDurationS: 1800
    # Defoltnaja dlitel'nost' impul'sa poliva (sek).
    defaultPulseRunS: 180
    # Defoltnaja pauza mezhdu impul'sami (sek).
    defaultPulsePauseS: 300
    # Maksimal'naja dlitel'nost' aktivnogo poliva (sek).
    maxActiveDurationS: 86400
    # Maksimal'nyj razmer stranicy zhurnala sessij.
    sessionPageMax: 100
    # Timeout podtverzhdenija ostanovki nasosa (sek).
    stoppingTimeoutS: 15
  ack:
    wait:
      # Timeout ozhidanija ACK po umolchaniju (sek).
      defaultTimeoutSeconds: 5
      # Maksimal'nyi timeout ACK (sek).
      maxTimeoutSeconds: 15
      # Interval polling (ms).
      pollIntervalMs: 500

mqtt:
  provisioning:
    # Provisioning klient imeet tol'ko prava Dynamic Security control.
    enabled: ${MQTT_PROVISIONING_ENABLED:false}
    host: ${MQTT_PROVISIONING_HOST:localhost}
    port: ${MQTT_PROVISIONING_PORT:8883}
    tls: ${MQTT_PROVISIONING_TLS:true}
    username: ${MQTT_PROVISIONING_USERNAME:}
    password: ${MQTT_PROVISIONING_PASSWORD:}
    responseTimeoutSeconds: 10
  # Maksimal'noe kolichestvo poslednih MQTT soobshchenij v pamjati.
  recentMessagesLimit: 200
  # Maksimal'naja dlina payload v poslednih MQTT soobshchenijah.
  recentPayloadChars: 4096
  topics:
    # Ogranichennye topiki backend vmesto global'noj podpiski '#'.
    listen: "${MQTT_LISTEN_TOPIC:}"
    listenTopics:
      - "gh/dev/#"
      - "zigbee2growerhub/#"
      - "gh/z2m/#"
    # Topic dlya state.
    state: "gh/dev/+/state"
    # Topic dlya ack.
    ack: "gh/dev/+/state/ack"
    # Topic dlya service events.
    events: "gh/dev/+/events"
    # Bazovyj topic Zigbee2MQTT.
    zigbeeBase: "zigbee2growerhub"
    # Bazovyj topic pol'zovatel'skih Zigbee2MQTT namespace.
    zigbeeUserPrefix: "gh/z2m"
    # Suffiks dlya state.
    stateSuffix: "/state"
    # Suffiks dlya ack.
    ackSuffix: "/state/ack"
    # Suffiks dlya service events.
    eventsSuffix: "/events"

app:
  debug:
    plantsTiming: false

zigbee:
  self-service:
    # Publichnyj self-service vklyuchaetsja tol'ko posle smoke-proverki.
    enabled: ${SELF_SERVICE_ENABLED:false}
    # Publichnoe MQTT podkljuchenie Zigbee2MQTT.
    mqttServer: "mqtts://growerhub.ru:8883"
    # Rol' klienta v Mosquitto Dynamic Security.
    brokerRole: "z2m-coordinator"
    # Kolichestvo sluchajnyh bytes parolja koordinatore.
    passwordBytes: 32
    # Tehnicheskaja zashchita ot chastoj vydachi broker credentials.
    credentialCooldownSeconds: 30
    # Bezopasnye writable capabilities dlya pervogo reliza.
    writableProperties: [state, brightness, color_temp]
  # Vremja otkrytogo soprjazhenija po umolchaniju (sek).
  permitJoinDefaultSeconds: 254
  history:
    # Maksimal'noe kolichestvo tochek Zigbee-svojstva.
    maxPoints: 200
    # Chasy istorii Zigbee po umolchaniju.
    defaultHours: 24

automation:
  # Period worker avtomatizacii (ms).
  workerPeriodMs: 30000
  # Period aktivnyh sessij poliva (ms).
  wateringWorkerPeriodMs: 1000
  # Maksimal'nyj vozrast dannyh sensora dlya scenariev (min).
  staleSensorMinutes: 15
  # Pauza posle ruchnogo vmeshatel'stva (min).
  manualOverrideMinutes: 15
  # Porog statusa net svjazi dlya resursov (min).
  resourceOfflineMinutes: 5
  # Porog statusa net svjazi dlya plitok datchikov (min).
  sensorOfflineMinutes: 20
  # Chasovoj poyas raspisanij.
  timezone: "Europe/Istanbul"
