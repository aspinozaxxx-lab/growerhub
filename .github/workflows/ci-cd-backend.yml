name: CI/CD Backend (Java)

on:
  pull_request:
    paths:
      - "backend/**"
      - "ansible/**"
      - ".github/workflows/ci-cd-backend.yml"
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - "ansible/**"
      - ".github/workflows/ci-cd-backend.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-main
  cancel-in-progress: true

jobs:
  ci:
    name: CI (java backend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x backend/gradlew

      - name: Gradle test
        working-directory: backend
        run: ./gradlew --no-daemon test

      - name: Gradle build
        working-directory: backend
        run: ./gradlew --no-daemon build -x test

      - name: Upload backend jar
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/app.jar
          if-no-files-found: error

  deploy:
    name: Deploy to production (java backend)
    runs-on: ubuntu-latest
    needs: [ ci ]
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    environment:
      name: production
      url: https://growerhub.ru/health
    env:
      SSH_HOST: growerhub.ru
      SSH_PORT: "6733"
      SSH_USER: watering-admin
      DEPLOY_DIR: /opt/growerhub/java-backend
      RUNTIME_DIR: /opt/growerhub/runtime
      SYSTEMD_DIR: /opt/growerhub/systemd
      SERVICE_NAME: growerhub-java-backend.service
      ENV_FILE: /opt/growerhub/env/growerhub-java-backend.env
      JAVA_URL: "https://api.adoptium.net/v3/binary/latest/21/ga/linux/x64/jre/hotspot/normal/eclipse?project=jdk"
    steps:
      - name: Download backend jar
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend-artifact

      - name: Setup SSH
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: SSH smoke test
        run: |
          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" "echo 'SSH OK'"

      - name: Prepare remote dirs and Java runtime
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" \
            "mkdir -p '$DEPLOY_DIR' '$RUNTIME_DIR' '$SYSTEMD_DIR'"
          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" <<EOF
          set -euo pipefail
          JAVA_DIR="$RUNTIME_DIR/jre-21"
          if [ ! -x "\$JAVA_DIR/bin/java" ]; then
            tmp_dir="\$(mktemp -d)"
            curl -fsSL -o "\$tmp_dir/jre.tar.gz" "$JAVA_URL"
            rm -rf "\$JAVA_DIR"
            mkdir -p "\$JAVA_DIR"
            tar -xzf "\$tmp_dir/jre.tar.gz" -C "\$JAVA_DIR" --strip-components=1
            rm -rf "\$tmp_dir"
          fi
          "\$JAVA_DIR/bin/java" -version
          EOF

      - name: Upload backend jar
        run: |
          rsync -azv \
            --omit-dir-times --no-perms --no-owner --no-group \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=yes" \
            ./backend-artifact/app.jar "$SSH_USER@$SSH_HOST:$DEPLOY_DIR/app.jar.new"

      - name: Deploy jar service
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" <<EOF
          set -euo pipefail
          DEPLOY_DIR="$DEPLOY_DIR"
          RUNTIME_DIR="$RUNTIME_DIR"
          SYSTEMD_DIR="$SYSTEMD_DIR"
          SERVICE_NAME="$SERVICE_NAME"
          ENV_FILE="$ENV_FILE"
          UNIT_FILE="\$SYSTEMD_DIR/\$SERVICE_NAME"

          if ! sudo -n /usr/bin/test -f "\$ENV_FILE"; then
            echo "Env file is missing: \$ENV_FILE" >&2
            exit 1
          fi
          for key in SECRET_KEY SPRING_DATASOURCE_URL SPRING_DATASOURCE_USERNAME SPRING_DATASOURCE_PASSWORD; do
            if ! sudo -n /usr/bin/grep -Eq "^\${key}=.+$" "\$ENV_FILE"; then
              echo "\$key is missing or empty in \$ENV_FILE" >&2
              exit 1
            fi
          done

          if ! sudo -n /usr/bin/grep -Eq '^MQTT_HOST=.+$' "\$ENV_FILE"; then
            sudo -n /bin/sed -i '\$a MQTT_HOST=127.0.0.1' "\$ENV_FILE"
          elif sudo -n /usr/bin/grep -Eq '^MQTT_HOST=172\\.17\\.0\\.1$' "\$ENV_FILE"; then
            sudo -n /bin/sed -i 's/^MQTT_HOST=.*/MQTT_HOST=127.0.0.1/' "\$ENV_FILE"
          fi
          if ! sudo -n /usr/bin/grep -Eq '^MQTT_PORT=.+$' "\$ENV_FILE"; then
            sudo -n /bin/sed -i '\$a MQTT_PORT=1883' "\$ENV_FILE"
          fi

          mkdir -p "\$DEPLOY_DIR/firmware_binaries"
          find "\$DEPLOY_DIR" -mindepth 1 -maxdepth 1 \
            ! -name 'app.jar' \
            ! -name 'app.jar.new' \
            ! -name 'firmware_binaries' \
            -exec rm -rf {} +
          mv "\$DEPLOY_DIR/app.jar.new" "\$DEPLOY_DIR/app.jar"

          cat > "\$UNIT_FILE" <<UNIT
          [Unit]
          Description=GrowerHub Java Backend
          After=network-online.target mosquitto.service
          Wants=network-online.target

          [Service]
          Type=simple
          User=watering-admin
          WorkingDirectory=\$DEPLOY_DIR
          EnvironmentFile=\$ENV_FILE
          Environment=SERVER_PORT=18080
          ExecStart=\$RUNTIME_DIR/jre-21/bin/java -jar \$DEPLOY_DIR/app.jar
          Restart=always
          RestartSec=5
          SuccessExitStatus=143

          [Install]
          WantedBy=multi-user.target
          UNIT

          if command -v docker >/dev/null 2>&1; then
            sudo -n /usr/bin/docker rm -f growerhub-java-backend >/dev/null 2>&1 || true
          fi

          sudo -n /usr/bin/systemctl link --force "\$UNIT_FILE"
          sudo -n /usr/bin/systemctl daemon-reload
          sudo -n /usr/bin/systemctl enable "\$SERVICE_NAME"
          sudo -n /usr/bin/systemctl restart "\$SERVICE_NAME"
          sudo -n /usr/bin/systemctl --no-pager --full status "\$SERVICE_NAME"
          EOF

      - name: Verify backend health and MQTT
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" <<EOF
          set -euo pipefail
          ok=0
          for i in \$(seq 1 180); do
            if sudo -n /usr/bin/curl -fsS http://127.0.0.1:18080/health >/tmp/health.json 2>/tmp/health.err; then
              ok=1
              sudo -n /usr/bin/cat /tmp/health.json
              break
            fi
            echo "healthcheck attempt \$i failed: \$(sudo -n /usr/bin/cat /tmp/health.err 2>/dev/null || true)"
            sleep 1
          done
          if [ "\$ok" -ne 1 ]; then
            sudo -n /usr/bin/journalctl -u "$SERVICE_NAME" --no-pager -n 200 || true
            exit 1
          fi

          logs_file="\$(mktemp)"
          sudo -n /usr/bin/journalctl -u "$SERVICE_NAME" --since "10 minutes ago" --no-pager > "\$logs_file"
          if grep -Eq "MQTT (publisher|subscriber) failed to start" "\$logs_file"; then
            sudo -n /usr/bin/journalctl -u "$SERVICE_NAME" --no-pager -n 200 || true
            rm -f "\$logs_file"
            exit 1
          fi

          mqtt_ok=0
          for i in \$(seq 1 60); do
            sudo -n /usr/bin/journalctl -u "$SERVICE_NAME" --since "10 minutes ago" --no-pager > "\$logs_file"
            if grep -q "MQTT publisher connected" "\$logs_file" && grep -q "MQTT subscriber connected" "\$logs_file"; then
              mqtt_ok=1
              break
            fi
            sleep 1
          done
          if [ "\$mqtt_ok" -ne 1 ]; then
            echo "MQTT publisher/subscriber did not connect" >&2
            sudo -n /usr/bin/journalctl -u "$SERVICE_NAME" --no-pager -n 200 || true
            rm -f "\$logs_file"
            exit 1
          fi
          rm -f "\$logs_file"
          if command -v docker >/dev/null 2>&1; then
            sudo -n /usr/bin/docker image rm growerhub-backend:local >/dev/null 2>&1 || true
          fi
          EOF
