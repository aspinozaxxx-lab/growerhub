name: Release Zigbee coordinator packages

on:
  push:
    tags:
      - "coordinator-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build packages
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".Replace("coordinator-", "")
          ./zigbee_coordinator/build-release.ps1 -Version $version

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            ./zigbee_coordinator/dist/*.zip `
            --title "GrowerHub coordinator ${{ github.ref_name }}" `
            --generate-notes
